<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0d0d1f"/>
      <stop offset="100%" stop-color="#05050e"/>
    </radialGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Deep dark background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Soft glow orbs -->
  <ellipse cx="200" cy="200" rx="500" ry="500" fill="url(#orb1)"/>
  <ellipse cx="1700" cy="880" rx="480" ry="480" fill="url(#orb2)"/>
  <ellipse cx="960" cy="1100" rx="420" ry="420" fill="url(#orb3)"/>
  <ellipse cx="1400" cy="100" rx="300" ry="300" fill="url(#orb4)"/>

  <!-- ── GRID LINES ── -->
  <g opacity="0.055" stroke="#6366f1" stroke-width="0.8">
    <!-- Vertical -->
    <line x1="120" y1="0" x2="120" y2="1080"/>
    <line x1="240" y1="0" x2="240" y2="1080"/>
    <line x1="360" y1="0" x2="360" y2="1080"/>
    <line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="600" y1="0" x2="600" y2="1080"/>
    <line x1="720" y1="0" x2="720" y2="1080"/>
    <line x1="840" y1="0" x2="840" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1080" y1="0" x2="1080" y2="1080"/>
    <line x1="1200" y1="0" x2="1200" y2="1080"/>
    <line x1="1320" y1="0" x2="1320" y2="1080"/>
    <line x1="1440" y1="0" x2="1440" y2="1080"/>
    <line x1="1560" y1="0" x2="1560" y2="1080"/>
    <line x1="1680" y1="0" x2="1680" y2="1080"/>
    <line x1="1800" y1="0" x2="1800" y2="1080"/>
    <!-- Horizontal -->
    <line x1="0" y1="120" x2="1920" y2="120"/>
    <line x1="0" y1="240" x2="1920" y2="240"/>
    <line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="480" x2="1920" y2="480"/>
    <line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="840" x2="1920" y2="840"/>
    <line x1="0" y1="960" x2="1920" y2="960"/>
  </g>

  <!-- ── NETWORK CONNECTIONS ── -->
  <g opacity="0.18" stroke="#6366f1" stroke-width="1" fill="none">
    <line x1="120" y1="240" x2="360" y2="120"/>
    <line x1="360" y1="120" x2="600" y2="360"/>
    <line x1="600" y1="360" x2="480" y2="600"/>
    <line x1="480" y1="600" x2="240" y2="720"/>
    <line x1="240" y1="720" x2="120" y2="480"/>
    <line x1="120" y1="480" x2="360" y2="360"/>
    <line x1="360" y1="360" x2="600" y2="240"/>
    <line x1="120" y1="240" x2="480" y2="480"/>
  </g>

  <g opacity="0.14" stroke="#8b5cf6" stroke-width="1" fill="none">
    <line x1="1440" y1="120" x2="1680" y2="240"/>
    <line x1="1680" y1="240" x2="1800" y2="480"/>
    <line x1="1800" y1="480" x2="1680" y2="720"/>
    <line x1="1680" y1="720" x2="1440" y2="840"/>
    <line x1="1440" y1="840" x2="1320" y2="600"/>
    <line x1="1320" y1="600" x2="1440" y2="360"/>
    <line x1="1440" y1="360" x2="1680" y2="480"/>
    <line x1="1680" y1="480" x2="1560" y2="720"/>
  </g>

  <g opacity="0.10" stroke="#06b6d4" stroke-width="0.8" fill="none">
    <line x1="720" y1="840" x2="960" y2="720"/>
    <line x1="960" y1="720" x2="1200" y2="840"/>
    <line x1="1200" y1="840" x2="1080" y2="960"/>
    <line x1="1080" y1="960" x2="840" y2="1000"/>
    <line x1="840" y1="1000" x2="720" y2="840"/>
  </g>

  <!-- Cross-network connections -->
  <g opacity="0.07" stroke="#a5b4fc" stroke-width="0.8" fill="none">
    <line x1="600" y1="360" x2="1320" y2="600"/>
    <line x1="480" y1="600" x2="1440" y2="360"/>
    <line x1="360" y1="120" x2="960" y2="240"/>
    <line x1="1680" y1="240" x2="960" y2="120"/>
  </g>

  <!-- ── FLOATING GEOMETRIC SHAPES ── -->

  <!-- Large hexagon outlines -->
  <polygon points="960,60 1040,105 1040,195 960,240 880,195 880,105"
    fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.12"/>
  <polygon points="960,80 1028,118 1028,194 960,232 892,194 892,118"
    fill="none" stroke="#8b5cf6" stroke-width="0.6" opacity="0.1"/>

  <polygon points="200,800 260,835 260,905 200,940 140,905 140,835"
    fill="none" stroke="#6366f1" stroke-width="1.2" opacity="0.15"/>

  <polygon points="1720,200 1780,235 1780,305 1720,340 1660,305 1660,235"
    fill="none" stroke="#8b5cf6" stroke-width="1.2" opacity="0.14"/>

  <!-- Rotating diamond shapes -->
  <rect x="840" y="470" width="50" height="50" rx="4"
    fill="none" stroke="#6366f1" stroke-width="1.2" opacity="0.22"
    transform="rotate(45 865 495)"/>
  <rect x="852" y="482" width="26" height="26" rx="2"
    fill="#6366f1" opacity="0.08"
    transform="rotate(45 865 495)"/>

  <rect x="1380" y="700" width="40" height="40" rx="3"
    fill="none" stroke="#8b5cf6" stroke-width="1.2" opacity="0.2"
    transform="rotate(45 1400 720)"/>

  <rect x="300" y="400" width="36" height="36" rx="3"
    fill="none" stroke="#ec4899" stroke-width="1" opacity="0.18"
    transform="rotate(45 318 418)"/>

  <!-- Small floating squares scattered -->
  <rect x="1100" y="180" width="18" height="18" rx="2"
    fill="none" stroke="#6366f1" stroke-width="1" opacity="0.3"
    transform="rotate(20 1109 189)"/>
  <rect x="700" y="650" width="14" height="14" rx="2"
    fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.25"
    transform="rotate(35 707 657)"/>
  <rect x="1600" y="550" width="16" height="16" rx="2"
    fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.22"
    transform="rotate(-20 1608 558)"/>
  <rect x="400" y="900" width="12" height="12" rx="2"
    fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0.2"
    transform="rotate(30 406 906)"/>

  <!-- Large circle rings -->
  <circle cx="960" cy="540" r="280" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.06"/>
  <circle cx="960" cy="540" r="380" fill="none" stroke="#8b5cf6" stroke-width="0.4" opacity="0.05"/>
  <circle cx="960" cy="540" r="460" fill="none" stroke="#6366f1" stroke-width="0.3" opacity="0.04"/>

  <!-- ── NETWORK NODES ── -->

  <!-- Left cluster -->
  <g filter="url(#nodeGlow)">
    <circle cx="120" cy="240" r="7" fill="#6366f1" opacity="0.8"/>
    <circle cx="120" cy="240" r="12" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <circle cx="360" cy="120" r="5" fill="#8b5cf6" opacity="0.75"/>
    <circle cx="360" cy="120" r="10" fill="none" stroke="#8b5cf6" stroke-width="0.8" opacity="0.25"/>
    <circle cx="600" cy="360" r="8" fill="#6366f1" opacity="0.7"/>
    <circle cx="600" cy="360" r="14" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.25"/>
    <circle cx="480" cy="600" r="5" fill="#a5b4fc" opacity="0.7"/>
    <circle cx="240" cy="720" r="6" fill="#8b5cf6" opacity="0.65"/>
    <circle cx="120" cy="480" r="4" fill="#6366f1" opacity="0.6"/>
    <circle cx="360" cy="360" r="5" fill="#a5b4fc" opacity="0.55"/>
    <circle cx="600" cy="240" r="4" fill="#8b5cf6" opacity="0.5"/>
  </g>

  <!-- Right cluster -->
  <g filter="url(#nodeGlow)">
    <circle cx="1680" cy="240" r="7" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="1680" cy="240" r="13" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.28"/>
    <circle cx="1440" cy="120" r="5" fill="#6366f1" opacity="0.7"/>
    <circle cx="1800" cy="480" r="8" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="1800" cy="480" r="14" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.22"/>
    <circle cx="1680" cy="720" r="5" fill="#a5b4fc" opacity="0.65"/>
    <circle cx="1440" cy="840" r="6" fill="#6366f1" opacity="0.6"/>
    <circle cx="1320" cy="600" r="5" fill="#8b5cf6" opacity="0.55"/>
    <circle cx="1440" cy="360" r="4" fill="#a5b4fc" opacity="0.5"/>
    <circle cx="1560" cy="720" r="4" fill="#6366f1" opacity="0.5"/>
  </g>

  <!-- Bottom cluster -->
  <g filter="url(#nodeGlow)">
    <circle cx="720" cy="840" r="6" fill="#06b6d4" opacity="0.7"/>
    <circle cx="720" cy="840" r="11" fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.22"/>
    <circle cx="960" cy="720" r="5" fill="#6366f1" opacity="0.65"/>
    <circle cx="1200" cy="840" r="6" fill="#06b6d4" opacity="0.65"/>
    <circle cx="1080" cy="960" r="4" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="840" cy="1000" r="4" fill="#06b6d4" opacity="0.5"/>
  </g>

  <!-- ── FLOATING DATA BLOCKS ── -->

  <!-- Block top-left -->
  <g opacity="0.25">
    <rect x="60" y="60" width="120" height="6" rx="3" fill="#6366f1"/>
    <rect x="60" y="74" width="80" height="4" rx="2" fill="#8b5cf6" opacity="0.6"/>
    <rect x="60" y="86" width="100" height="4" rx="2" fill="#6366f1" opacity="0.4"/>
    <rect x="60" y="98" width="60" height="4" rx="2" fill="#a5b4fc" opacity="0.35"/>
  </g>

  <!-- Block top-right -->
  <g opacity="0.22">
    <rect x="1740" y="80" width="110" height="5" rx="2" fill="#8b5cf6"/>
    <rect x="1740" y="93" width="75" height="4" rx="2" fill="#6366f1" opacity="0.6"/>
    <rect x="1740" y="105" width="90" height="4" rx="2" fill="#8b5cf6" opacity="0.4"/>
  </g>

  <!-- Block bottom-left -->
  <g opacity="0.2">
    <rect x="80" y="960" width="100" height="5" rx="2" fill="#6366f1"/>
    <rect x="80" y="973" width="130" height="4" rx="2" fill="#8b5cf6" opacity="0.5"/>
    <rect x="80" y="985" width="70" height="4" rx="2" fill="#a5b4fc" opacity="0.4"/>
  </g>

  <!-- Block bottom-right -->
  <g opacity="0.2">
    <rect x="1720" y="950" width="120" height="5" rx="2" fill="#8b5cf6"/>
    <rect x="1720" y="963" width="85" height="4" rx="2" fill="#6366f1" opacity="0.5"/>
    <rect x="1720" y="975" width="100" height="4" rx="2" fill="#a5b4fc" opacity="0.35"/>
  </g>

  <!-- ── CIRCUIT TRACES ── -->
  <g opacity="0.12" stroke="#6366f1" stroke-width="1.2" fill="none">
    <polyline points="0,350 80,350 80,300 160,300"/>
    <circle cx="80" cy="350" r="3" fill="#6366f1" opacity="0.6"/>
    <circle cx="160" cy="300" r="3" fill="#6366f1" opacity="0.6"/>

    <polyline points="0,680 60,680 60,760 140,760"/>
    <circle cx="60" cy="680" r="3" fill="#8b5cf6" opacity="0.6"/>

    <polyline points="1920,280 1840,280 1840,200 1760,200"/>
    <circle cx="1840" cy="280" r="3" fill="#6366f1" opacity="0.6"/>

    <polyline points="1920,650 1860,650 1860,580 1780,580"/>
    <circle cx="1860" cy="650" r="3" fill="#8b5cf6" opacity="0.6"/>
  </g>

  <!-- ── SCATTERED DOTS ── -->
  <g fill="#6366f1">
    <circle cx="750" cy="200" r="2.5" opacity="0.3"/>
    <circle cx="820" cy="310" r="2" opacity="0.25"/>
    <circle cx="1100" cy="160" r="2.5" opacity="0.28"/>
    <circle cx="1250" cy="280" r="2" opacity="0.22"/>
    <circle cx="550" cy="780" r="2.5" opacity="0.25"/>
    <circle cx="1380" cy="900" r="2" opacity="0.22"/>
    <circle cx="680" cy="500" r="2" opacity="0.2"/>
    <circle cx="1280" cy="460" r="2.5" opacity="0.22"/>
  </g>
  <g fill="#8b5cf6">
    <circle cx="900" cy="900" r="2.5" opacity="0.28"/>
    <circle cx="1050" cy="850" r="2" opacity="0.22"/>
    <circle cx="300" cy="550" r="2" opacity="0.25"/>
    <circle cx="1600" cy="350" r="2.5" opacity="0.25"/>
    <circle cx="1750" cy="650" r="2" opacity="0.2"/>
  </g>

  <!-- ── CENTRAL ACCENT GLOW (where login card sits) ── -->
  <ellipse cx="960" cy="500" rx="200" ry="160" fill="#6366f1" opacity="0.04"/>
  <ellipse cx="960" cy="500" rx="100" ry="80" fill="#8b5cf6" opacity="0.05"/>

  <!-- ── SUBTLE VIGNETTE ── -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
