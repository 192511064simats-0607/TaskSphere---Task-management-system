<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login — TaskSphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <style>

    /* ================================================
       ✅ BACKGROUND IMAGE — fitted here
       ================================================ */
    body {
      background-image: url('/static/images/tasksphere-login-bg.svg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-color: #05050e;
    }

    /* ✅ FROSTED GLASS CARD — fitted here */
    .auth-card {
      background: rgba(13, 13, 31, 0.82) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
      border: 1px solid rgba(99, 102, 241, 0.28) !important;
      box-shadow:
        0 25px 60px rgba(0, 0, 0, 0.55),
        0 0 0 1px rgba(99, 102, 241, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.06) !important;
    }

    /* ================================================
       All your original styles below — unchanged
       ================================================ */

    .floating-orbs {
      position: fixed; inset: 0;
      pointer-events: none; overflow: hidden; z-index: 0;
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: .18;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .orb1 { width:400px;height:400px;background:var(--accent);top:-100px;left:-100px; }
    .orb2 { width:300px;height:300px;background:var(--accent2);bottom:-50px;right:-50px;animation-delay:-3s; }
    .orb3 { width:200px;height:200px;background:#f59e0b;top:50%;right:20%;animation-delay:-5s;opacity:.1; }

    @keyframes orbFloat {
      0%,100% { transform:translate(0,0) scale(1); }
      33%      { transform:translate(30px,-20px) scale(1.05); }
      66%      { transform:translate(-20px,30px) scale(.95); }
    }

    .auth-page { position: relative; z-index: 1; }

    .particles { position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden; }
    .particle {
      position: absolute; width: 2px; height: 2px;
      background: var(--accent); border-radius: 50%;
      animation: particleDrift linear infinite;
    }
    @keyframes particleDrift {
      from { transform:translateY(100vh) rotate(0deg);   opacity:1; }
      to   { transform:translateY(-20px)  rotate(720deg); opacity:0; }
    }

    .logo-icon { animation: iconSpin 3s ease-in-out infinite; }
    @keyframes iconSpin {
      0%,100% { transform:rotateY(0deg);   }
      50%      { transform:rotateY(180deg); }
    }

    .feature-list { list-style:none;margin-top:16px;display:flex;flex-direction:column;gap:8px; }
    .feature-list li { display:flex;align-items:center;gap:9px;font-size:.83rem;color:var(--text-secondary); }
    .feature-list li i { color:var(--success);font-size:.8rem;width:16px; }

    /* Input icon helper */
    .input-with-icon { position: relative; }
    .input-icon {
      position:absolute;left:14px;top:50%;transform:translateY(-50%);
      color:var(--text-muted);font-size:13px;pointer-events:none;
    }
    .input-with-icon .form-control { padding-left: 38px; }
    .password-toggle {
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;
      color:var(--text-muted);font-size:14px;padding:0;
    }
    .password-toggle:hover { color: var(--text-primary); }
    .input-error {
      border-color: var(--danger) !important;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.15) !important;
    }

  </style>
</head>
<body>

<!-- Floating orbs — layered on top of the bg image -->
<div class="floating-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<!-- Rising particles -->
<div class="particles" id="particles"></div>

<!-- ===== LOGIN CARD ===== -->
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon"
           style="width:56px;height:56px;
                  background:linear-gradient(135deg,var(--accent),var(--accent2));
                  border-radius:16px;display:flex;align-items:center;
                  justify-content:center;color:#fff;font-size:1.5rem;
                  margin:0 auto 14px;
                  box-shadow:0 0 40px var(--accent-glow)">
        <i class="fas fa-layer-group"></i>
      </div>
      <h1>Welcome Back</h1>
      <p>Sign in to TaskSphere — your command center</p>
    </div>

    <!-- Error banner -->
    <div id="errorBanner"
         style="display:none;
                background:rgba(239,68,68,.12);
                border:1px solid rgba(239,68,68,.3);
                border-radius:10px;padding:12px 16px;
                color:var(--danger);font-size:.85rem;margin-bottom:16px;">
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-with-icon">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" name="email" class="form-control"
                 placeholder="you@example.com" required autofocus>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-with-icon">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="password" id="pwdInput"
                 class="form-control" placeholder="Enter password"
                 required style="padding-right:42px">
          <button type="button" class="password-toggle" id="pwdToggle">
            <i class="fas fa-eye" id="pwdIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary"
              style="width:100%;justify-content:center;margin-top:6px;padding:13px"
              id="loginBtn">
        <i class="fas fa-arrow-right-to-bracket"></i> Sign In
      </button>
    </form>

    <ul class="feature-list">
      <li><i class="fas fa-check-circle"></i> Real-time collaborative task management</li>
      <li><i class="fas fa-check-circle"></i> Kanban boards &amp; calendar view</li>
      <li><i class="fas fa-check-circle"></i> Team notifications &amp; activity feed</li>
    </ul>

    <div class="auth-footer">
      Don't have an account?
      <a href="{{ url_for('register') }}">Create one free →</a>
    </div>

  </div>
</div>

<script>
// ── Spawn rising particles ──
const pContainer = document.getElementById('particles');
for (let i = 0; i < 20; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left              = Math.random() * 100 + '%';
  p.style.animationDuration = (Math.random() * 15 + 8) + 's';
  p.style.animationDelay    = (Math.random() * 10) + 's';
  p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
  p.style.opacity = Math.random() * 0.5 + 0.1;
  pContainer.appendChild(p);
}

// ── Password toggle ──
document.getElementById('pwdToggle').addEventListener('click', function () {
  const inp  = document.getElementById('pwdInput');
  const icon = document.getElementById('pwdIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    inp.type = 'password';
    icon.className = 'fas fa-eye';
  }
});

// ── Login form submit ──
document.getElementById('loginForm').addEventListener('submit', async function (e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorBanner');
  const fd  = new FormData(this);

  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in…';
  btn.disabled  = true;
  err.style.display = 'none';

  try {
    const res  = await fetch('/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        email:    fd.get('email'),
        password: fd.get('password')
      })
    });
    const data = await res.json();

    if (data.success) {
      btn.innerHTML = '<i class="fas fa-check"></i> Redirecting…';
      btn.style.background = 'linear-gradient(135deg,#10b981,#34d399)';
      setTimeout(() => window.location.href = data.redirect, 400);
    } else {
      err.textContent   = data.message || 'Login failed';
      err.style.display = 'block';
      document.querySelector('[name="password"]').classList.add('input-error');
      btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Sign In';
      btn.disabled  = false;
    }
  } catch (ex) {
    err.textContent   = 'Network error. Please try again.';
    err.style.display = 'block';
    btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Sign In';
    btn.disabled  = false;
  }
});

// ── Apply saved theme ──
const theme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', theme);
</script>
</body>
</html>
