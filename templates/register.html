<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Register — TaskSphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .floating-orbs{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
    .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;animation:orbFloat 8s ease-in-out infinite}
    .orb1{width:500px;height:500px;background:var(--accent);top:-150px;right:-150px}
    .orb2{width:350px;height:350px;background:var(--accent2);bottom:-80px;left:-80px;animation-delay:-4s}
    @keyframes orbFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-20px)}}
    .auth-page{position:relative;z-index:1}
    .strength-bar{height:4px;border-radius:99px;background:var(--bg-surface);margin-top:8px;overflow:hidden}
    .strength-fill{height:100%;border-radius:99px;transition:width .3s,background .3s}
    .step-indicator{display:flex;gap:6px;justify-content:center;margin-bottom:24px}
    .step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .3s}
    .step-dot.active{background:var(--accent);width:24px;border-radius:99px}
    .step-dot.done{background:var(--success)}
  </style>
</head>
<body>
<div class="floating-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.5rem;margin:0 auto 14px;box-shadow:0 0 40px var(--accent-glow)">
        <i class="fas fa-layer-group"></i>
      </div>
      <h1>Create Account</h1>
      <p>Join TaskSphere and supercharge your team</p>
    </div>

    <div class="step-indicator">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <div class="step-dot" id="dot3"></div>
    </div>

    <div id="errorBanner" style="display:none;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:12px 16px;color:var(--danger);font-size:.85rem;margin-bottom:16px;"></div>
    <div id="successBanner" style="display:none;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:10px;padding:12px 16px;color:var(--success);font-size:.85rem;margin-bottom:16px;"></div>

    <form id="registerForm" novalidate>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <div class="input-with-icon">
          <i class="fas fa-user input-icon"></i>
          <input type="text" name="name" class="form-control" placeholder="John Doe" required autofocus>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-with-icon">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" name="email" class="form-control" placeholder="you@company.com" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <div class="input-with-icon">
          <i class="fas fa-briefcase input-icon"></i>
          <select name="role" class="form-control">
            <option value="member">Team Member</option>
            <option value="manager">Project Manager</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-with-icon" style="position:relative">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="password" id="pwdInput" class="form-control" placeholder="Min 8 characters" required style="padding-right:42px" oninput="checkStrength(this.value)">
          <button type="button" class="password-toggle" onclick="togglePwd()"><i class="fas fa-eye" id="eyeIcon"></i></button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill" style="width:0%"></div></div>
        <span id="strengthText" class="text-muted text-sm" style="display:block;margin-top:4px"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="input-with-icon">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="confirm" id="confirmPwd" class="form-control" placeholder="Repeat password" required>
        </div>
        <span id="matchText" class="text-sm" style="display:block;margin-top:4px"></span>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;margin-top:4px" id="regBtn">
        <i class="fas fa-rocket"></i> Create My Account
      </button>
    </form>

    <div class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Sign in →</a></div>
  </div>
</div>

<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');

function togglePwd() {
  const inp = document.getElementById('pwdInput');
  const ico = document.getElementById('eyeIcon');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  ico.className = inp.type === 'text' ? 'fas fa-eye-slash' : 'fas fa-eye';
}

function checkStrength(val) {
  const fill = document.getElementById('strengthFill');
  const text = document.getElementById('strengthText');
  let score = 0;
  if (val.length >= 8)  score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const configs = [
    { w:'0%',   c:'',              t:'' },
    { w:'25%',  c:'var(--danger)', t:'Weak' },
    { w:'50%',  c:'var(--warning)',t:'Fair' },
    { w:'75%',  c:'var(--info)',   t:'Good' },
    { w:'100%', c:'var(--success)',t:'Strong 💪' }
  ];
  const cfg = configs[score];
  fill.style.width      = cfg.w;
  fill.style.background = cfg.c;
  text.textContent      = cfg.t;
  text.style.color      = cfg.c;
  // step dots
  document.getElementById('dot1').className = 'step-dot done';
  if (score >= 2) document.getElementById('dot2').className = 'step-dot active';
  if (score >= 4) { document.getElementById('dot2').className = 'step-dot done'; document.getElementById('dot3').className = 'step-dot active'; }
}

document.getElementById('confirmPwd').addEventListener('input', function() {
  const pwd  = document.getElementById('pwdInput').value;
  const text = document.getElementById('matchText');
  if (!this.value) { text.textContent = ''; return; }
  if (this.value === pwd) { text.textContent = '✓ Passwords match'; text.style.color = 'var(--success)'; }
  else { text.textContent = '✗ Passwords do not match'; text.style.color = 'var(--danger)'; }
});

document.getElementById('registerForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn  = document.getElementById('regBtn');
  const err  = document.getElementById('errorBanner');
  const succ = document.getElementById('successBanner');
  const fd   = new FormData(this);
  err.style.display = succ.style.display = 'none';

  const pwd  = fd.get('password');
  const conf = fd.get('confirm');
  if (pwd !== conf) { err.textContent = 'Passwords do not match'; err.style.display = 'block'; return; }
  if (pwd.length < 8)  { err.textContent = 'Password must be at least 8 characters'; err.style.display = 'block'; return; }

  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating…';
  btn.disabled  = true;

  try {
    const res  = await fetch('/register', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name: fd.get('name'), email: fd.get('email'), password: pwd, role: fd.get('role') }) });
    const data = await res.json();
    if (data.success) {
      succ.textContent = '🎉 Account created! Redirecting to login…';
      succ.style.display = 'block';
      btn.innerHTML = '<i class="fas fa-check"></i> Done!';
      btn.style.background = 'linear-gradient(135deg,#10b981,#34d399)';
      setTimeout(() => window.location.href = '/login', 1500);
    } else {
      err.textContent = data.message || 'Registration failed';
      err.style.display = 'block';
      btn.innerHTML = '<i class="fas fa-rocket"></i> Create My Account';
      btn.disabled  = false;
    }
  } catch {
    err.textContent = 'Network error. Please try again.';
    err.style.display = 'block';
    btn.innerHTML = '<i class="fas fa-rocket"></i> Create My Account';
    btn.disabled  = false;
  }
});
</script>
</body>
</html>
