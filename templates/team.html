{% extends "base.html" %}
{% block title %}Team{% endblock %}
{% block content %}
<div class="page-header" data-aos="fade-down">
  <div>
    <div class="page-title">Team <span>Members</span></div>
    <div class="page-subtitle">View your entire team and their workload</div>
  </div>
  <div class="page-actions">
    <div class="search-box" style="max-width:240px">
      <i class="fas fa-magnifying-glass search-icon"></i>
      <input type="text" class="form-control" placeholder="Search members…" id="teamSearch" oninput="filterTeam()">
    </div>
    <select class="form-control" style="width:150px" id="roleFilter" onchange="filterTeam()">
      <option value="">All Roles</option>
      <option value="admin">Admin</option>
      <option value="manager">Manager</option>
      <option value="member">Member</option>
    </select>
  </div>
</div>

<!-- TEAM STATS STRIP -->
<div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:28px" data-aos="fade-up">
  <div class="stat-card">
    <div class="stat-icon purple"><i class="fas fa-users"></i></div>
    <div class="stat-body"><div class="stat-value" id="totalMembers">—</div><div class="stat-label">Total Members</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon green"><i class="fas fa-user-check"></i></div>
    <div class="stat-body"><div class="stat-value" id="activeMembers">—</div><div class="stat-label">Active Today</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon cyan"><i class="fas fa-briefcase"></i></div>
    <div class="stat-body"><div class="stat-value" id="totalManagers">—</div><div class="stat-label">Managers</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon yellow"><i class="fas fa-crown"></i></div>
    <div class="stat-body"><div class="stat-value" id="totalAdmins">—</div><div class="stat-label">Admins</div></div>
  </div>
</div>

<!-- TEAM GRID -->
<div class="team-grid" id="teamGrid" data-aos="fade-up" data-aos-delay="60"></div>

<!-- MEMBER DETAIL MODAL -->
<div class="modal-backdrop" id="memberModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title" id="memberModalTitle">Member Profile</span>
      <button class="modal-close"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="modal-body" id="memberModalBody">Loading…</div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
let allMembers = [];

async function loadTeam() {
  const [users, tasks] = await Promise.all([apiGet('/api/users'), apiGet('/api/tasks')]);
  allMembers = users;

  // Compute stats
  animateCount(document.getElementById('totalMembers'),  users.length);
  animateCount(document.getElementById('totalManagers'), users.filter(u=>u.role==='manager').length);
  animateCount(document.getElementById('totalAdmins'),   users.filter(u=>u.role==='admin').length);
  animateCount(document.getElementById('activeMembers'), users.length); // approximate

  // attach task counts
  users.forEach(u => {
    u._tasks     = tasks.filter(t => t.assignee_id === u._id).length;
    u._completed = tasks.filter(t => t.assignee_id === u._id && t.status === 'completed').length;
  });
  renderTeam(users);
}

function filterTeam() {
  const q    = document.getElementById('teamSearch').value.toLowerCase();
  const role = document.getElementById('roleFilter').value;
  const filtered = allMembers.filter(u =>
    (!q    || (u.name||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q)) &&
    (!role || u.role === role)
  );
  renderTeam(filtered);
}

function renderTeam(users) {
  const grid = document.getElementById('teamGrid');
  if (!users.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon"><i class="fas fa-users"></i></div>
      <div class="empty-title">No members found</div>
      <div class="empty-text">Adjust your search filters</div>
    </div>`;
    return;
  }
  grid.innerHTML = users.map((u, i) => {
    const progress = u._tasks ? Math.round(u._completed / u._tasks * 100) : 0;
    const roleColors = { admin:'var(--danger)', manager:'var(--warning)', member:'var(--accent)' };
    const color = roleColors[u.role] || 'var(--accent)';
    return `<div class="team-card" data-aos="zoom-in" data-aos-delay="${i*40}" onclick="viewMember('${u._id}')">
      <div style="position:relative;display:inline-block">
        <img class="team-avatar" src="${u.avatar || `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(u.name)}`}" alt="${esc(u.name)}">
        <span class="status-dot online" style="position:absolute;bottom:2px;right:2px;border-color:var(--bg-card)"></span>
      </div>
      <div class="team-name">${esc(u.name)}</div>
      <div class="team-role" style="color:${color}">${esc(u.role)}</div>
      <div class="text-muted text-sm" style="margin-bottom:12px">${esc(u.department||u.email||'')}</div>
      <div class="progress-bar" style="margin-bottom:10px">
        <div class="progress-fill" style="width:${progress}%;background:${color}"></div>
      </div>
      <div class="team-stats">
        <div class="team-stat"><strong>${u._tasks||0}</strong> tasks</div>
        <div class="team-stat"><strong>${u._completed||0}</strong> done</div>
        <div class="team-stat"><strong>${progress}%</strong></div>
      </div>
    </div>`;
  }).join('');
  setTimeout(() => AOS.refresh(), 50);
}

async function viewMember(id) {
  openModal('memberModal');
  const body = document.getElementById('memberModalBody');
  body.innerHTML = '<div class="skeleton" style="height:300px;border-radius:12px"></div>';
  const [u, tasks] = await Promise.all([
    Promise.resolve(allMembers.find(m => m._id === id)),
    apiGet(`/api/tasks?assignee=${id}`)
  ]);
  if (!u) { body.innerHTML = 'User not found'; return; }
  document.getElementById('memberModalTitle').textContent = u.name;

  const completed   = tasks.filter(t => t.status === 'completed').length;
  const inProgress  = tasks.filter(t => t.status === 'in_progress').length;
  const todo        = tasks.filter(t => t.status === 'todo').length;
  const overdue     = tasks.filter(t => t.deadline && new Date(t.deadline) < new Date() && t.status !== 'completed').length;

  body.innerHTML = `
    <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)">
      <img src="${u.avatar || `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(u.name)}`}"
           style="width:72px;height:72px;border-radius:50%;border:2px solid var(--accent);box-shadow:0 0 20px var(--accent-glow)">
      <div>
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem">${esc(u.name)}</div>
        <div class="text-muted text-sm">${esc(u.email)}</div>
        <div style="margin-top:8px;display:flex;gap:8px">
          <span class="badge-pill badge-active">${esc(u.role)}</span>
          ${u.department ? `<span class="chip"><i class="fas fa-building"></i> ${esc(u.department)}</span>` : ''}
        </div>
      </div>
    </div>
    ${u.bio ? `<p class="text-muted text-sm" style="margin-bottom:20px">${esc(u.bio)}</p>` : ''}
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px">
      ${[['Total',tasks.length,'cyan'],['Done',completed,'green'],['Active',inProgress,'yellow'],['Overdue',overdue,'red']].map(([l,v,c])=>`
        <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center">
          <div style="font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--${c==='cyan'?'accent2':c==='green'?'success':c==='yellow'?'warning':'danger'})">${v}</div>
          <div class="text-muted text-sm">${l}</div>
        </div>`).join('')}
    </div>
    <div class="section-title">Assigned Tasks</div>
    ${tasks.length ? `<div class="table-wrap autoscroll" style="max-height:240px">
      <table>
        <thead><tr><th>Title</th><th>Status</th><th>Priority</th><th>Deadline</th></tr></thead>
        <tbody>
          ${tasks.map(t=>`<tr>
            <td style="font-weight:600">${esc(t.title)}</td>
            <td>${statusBadge(t.status)}</td>
            <td>${priorityBadge(t.priority)}</td>
            <td class="${deadlineClass(t.deadline)}" style="font-size:.8rem">${t.deadline?new Date(t.deadline).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : '<div class="empty-state" style="padding:20px"><div class="empty-text">No tasks assigned</div></div>'}
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center">
      ${u.phone ? `<span class="chip"><i class="fas fa-phone"></i> ${esc(u.phone)}</span>` : ''}
      <span class="chip text-muted"><i class="fas fa-clock"></i> Joined ${formatTime(u.created_at)}</span>
      <span class="chip text-muted"><i class="fas fa-right-to-bracket"></i> Last login ${formatTime(u.last_login)}</span>
    </div>
  `;
}
window.viewMember = viewMember;

loadTeam();
</script>
{% endblock %}
